                    map: 'china',           // 使用中国地图
                    roam: false,            // 禁用缩放和平移
                    zoom: 1.25,             // 缩放比例
                    center: [105, 36],      // 地图中心点
                    itemStyle: { 
                        areaColor: '#e8f4fc',     // 区域填充颜色
                        borderColor: '#b8d4e8',   // 边框颜色
                        borderWidth: 1            // 边框宽度
                    },
                    label: {
                        show: true,            // 显示省份名称
                        fontSize: 11,          // 字体大小
                        color: '#4a5568',      // 字体颜色
                        fontWeight: 'normal'   // 字体粗细
                    },
                    emphasis: {
                        itemStyle: { 
                            areaColor: '#3498db',   // 悬停时区域颜色
                            borderColor: '#2980b9', // 悬停时边框颜色
                            borderWidth: 2          // 悬停时边框宽度
                        },
                        label: {
                            show: true,            // 悬停时显示省份名称
                            color: '#fff',         // 悬停时字体颜色
                            fontSize: 12,          // 悬停时字体大小
                            fontWeight: 'bold'     // 悬停时字体粗细
                        }
                    }
                },
                
                // 系列配置
                series: [{
                    type: 'map',      // 图表类型：地图
                    map: 'china',     // 使用中国地图
                    geoIndex: 0,      // 使用第一个地理坐标系
                    label: {
                        show: true,            // 显示省份名称
                        fontSize: 11,          // 字体大小
                        color: '#4a5568'      // 字体颜色
                    },
                    emphasis: {
                        label: {
                            show: true,            // 悬停时显示省份名称
                            fontSize: 12,          // 悬停时字体大小
                            color: '#fff',         // 悬停时字体颜色
                            fontWeight: 'bold'     // 悬停时字体粗细
                        }
                    }
                }]
            };
            
            // 应用配置到地图
            chart.setOption(option);
            
            // 添加地图点击事件监听器
            chart.on('click', function(params) { 
                // 点击省份时显示该省份的高校信息（排除南海诸岛）
                if (params.name !== '南海诸岛') showProvinceModal(params.name); 
            });
        }

        // ========================================
        // 数据筛选函数
        // ========================================
        
        // 根据省份名称和筛选条件获取高校列表
        function getUniversitiesByProvince(provinceName) {
            // 移除省份名称后缀（如"北京市"→"北京"）
            const cleanProvince = provinceName.replace(/[省市自治区特别行政区]/g, '');
            
            // 先筛选出该省份的所有高校
            let filtered = universityData.filter(function(u) {
                if (!u.location) return false;
                const locationClean = u.location.replace(/[省市自治区特别行政区]/g, '');
                const locationMatch = locationClean === cleanProvince;
                const cityMatch = u.city === provinceName || u.city === locationClean;
                return (locationMatch || cityMatch);
            });

            // 应用办学层次筛选
            if (eduLevelFilter === 'undergraduate') {
                filtered = filtered.filter(function(u) { return u.eduLevel === '本科' || u.eduLevel === '职业本科'; });
            } else if (eduLevelFilter === 'junior') {
                filtered = filtered.filter(function(u) { return u.eduLevel === '专科'; });
            }

            // 应用双一流筛选
            if (extraFilters.doubleFirst) {
                filtered = filtered.filter(function(u) { 
                    return u.level && (u.level.includes('双一流') || u.level.includes('985') || u.level.includes('211')); 
                });
            }

            // 应用公办/民办筛选
            if (extraFilters.public !== null) {
                if (extraFilters.public) {
                    // 筛选公办院校（不包含"教育厅"和"民办"的）
                    filtered = filtered.filter(function(u) { 
                        return !u.admin.includes('教育厅') && !u.admin.includes('民办') && !u.level.includes('民办'); 
                    });
                } else {
                    // 筛选民办院校（包含"教育厅"或"民办"的）
                    filtered = filtered.filter(function(u) { 
                        return u.admin.includes('教育厅') || u.admin.includes('民办') || u.level.includes('民办'); 
                    });
                }
            }

            return filtered;
        }

        // ========================================
        // 统计计算函数
        // ========================================
        
        // 计算高校统计数据
        function calculateStats(universities) {
            const stats = {
                total: universities.length,  // 高校总数
                undergraduate: universities.filter(function(u) { 
                    return u.eduLevel === '本科' || u.eduLevel === '职业本科'; 
                }).length,  // 本科数量
                junior: universities.filter(function(u) { 
                    return u.eduLevel === '专科'; 
                }).length,  // 专科数量
                doubleFirst: universities.filter(function(u) { 
                    return u.level && (u.level.includes('双一流') || u.level.includes('985') || u.level.includes('211')); 
                }).length,  // 双一流数量
                public: universities.filter(function(u) { 
                    return !u.admin.includes('教育厅') && !u.admin.includes('民办') && !u.level.includes('民办'); 
                }).length,  // 公办数量
                private: universities.filter(function(u) { 
                    return u.admin.includes('教育厅') || u.admin.includes('民办') || u.level.includes('民办'); 
                }).length  // 民办数量
            };
            stats.publicRatio = stats.total > 0 ? Math.round(stats.public / stats.total * 100) : 0;
            stats.privateRatio = 100 - stats.publicRatio;
            return stats;
        }

        // ========================================
        // 统计卡片渲染函数
        // ========================================
        
        // 渲染统计卡片
        function renderStats(stats) {
            // 计算公办/民办比例
            const ratio = formatRatio(stats.public, stats.private);
            
            // 根据筛选状态设置激活样式
            const dfActive = extraFilters.doubleFirst ? ' active' : '';
            const pubActive = extraFilters.public !== null ? ' active' : '';
            
            // 生成统计卡片HTML
            const statsHtml = 
                '<div class="stat-card"><div class="stat-value">' + stats.total + '</div><div class="stat-label">高校总数</div></div>' +
                '<div class="stat-card"><div class="stat-value">' + stats.undergraduate + '</div><div class="stat-label">本科数量</div></div>' +
                '<div class="stat-card"><div class="stat-value">' + stats.junior + '</div><div class="stat-label">专科数量</div></div>' +
                '<div class="stat-card stat-filter' + dfActive + '" data-filter="doubleFirst"><div class="stat-value">' + stats.doubleFirst + '</div><div class="stat-label">双一流数量</div></div>' +
                '<div class="stat-card stat-filter' + pubActive + '" data-filter="public"><div class="stat-value">' + ratio + '</div><div class="stat-label">公办/民办</div></div>';
            
            // 将HTML插入页面
            document.getElementById('modalStats').innerHTML = statsHtml;

            // 为可筛选的统计卡片添加点击事件
            document.querySelectorAll('.stat-card.stat-filter').forEach(function(card) {
                card.addEventListener('click', function() {
                    const filterType = this.getAttribute('data-filter');
                    
                    if (filterType === 'doubleFirst') {
                        // 切换双一流筛选
                        extraFilters.doubleFirst = !extraFilters.doubleFirst;
                    } else if (filterType === 'public') {
                        // 循环切换公办/民办筛选：无→公办→民办→无
                        if (extraFilters.public === null) {
                            extraFilters.public = true;
                        } else if (extraFilters.public === true) {
                            extraFilters.public = false;
                        } else {
                            extraFilters.public = null;
                        }
                    }
                    
                    // 更新筛选指示器并刷新高校列表
                    updateFilterIndicator();
                    refreshUniversityList();
                });
            });
        }

        // ========================================
        // 筛选指示器更新函数
        // ========================================
        
        // 更新筛选指示器显示
        function updateFilterIndicator() {
            const filters = [];
            
            // 收集所有生效的筛选条件
            if (eduLevelFilter === 'undergraduate') {
                filters.push('本科');
            } else if (eduLevelFilter === 'junior') {
                filters.push('专科');
            }
            
            if (extraFilters.doubleFirst) {
                filters.push('双一流');
            }
            
            if (extraFilters.public === true) {
                filters.push('公办');
            } else if (extraFilters.public === false) {
                filters.push('民办');
            }
            
            // 更新指示器显示
            const indicator = document.getElementById('filterIndicator');
            const currentFilters = document.getElementById('currentFilters');
            
            if (filters.length > 0) {
                indicator.style.display = 'block';
                currentFilters.innerHTML = filters.join(' + ');
            } else {
                indicator.style.display = 'none';
            }
        }

        // ========================================
        // 饼图创建函数
        // ========================================
        
        // 创建饼图
        function createPieChart(chartId, title, data) {
            const dom = document.getElementById(chartId);
            if (!dom) {
                console.error('Chart DOM not found:', chartId);
                return null;
            }
            
            // 初始化ECharts实例
            const chart = echarts.init(dom);
            
            // 配置饼图选项
            chart.setOption({
                title: { 
                    text: title,           // 图表标题
                    left: 'center',        // 标题水平居中
                    top: 2,                // 标题距离顶部距离
                    fontSize: 11,          // 标题字体大小
                    color: '#5a6a7a',      // 标题颜色
                    fontWeight: 'normal'   // 标题字体粗细
                },
                tooltip: { 
                    trigger: 'item',       // 触发方式：数据项
                    formatter: '{b}: {c}所 ({d}%)',  // 提示框格式
                    backgroundColor: 'rgba(255,255,255,0.95)',
                    borderColor: '#e2e8f0',
                    borderWidth: 1,
                    textStyle: { color: '#2d3748' }
                },
                legend: { 
                    orient: 'vertical',    // 图例垂直排列
                    right: 5,              // 图例距离右侧距离
                    top: 'middle',         // 图例垂直居中
                    fontSize: 11,          // 图例字体大小
                    itemGap: 10,           // 图例项间距
                    textStyle: { color: '#5a6a7a' }
                },
                series: [{
                    type: 'pie',           // 图表类型：饼图
                    radius: ['40%', '70%'], // 环形图内外半径
                    center: ['40%', '58%'], // 饼图中心位置
                    data: data,            // 数据
                    label: { 
                        fontSize: 10,      // 标签字体大小
                        color: '#4a5568',  // 标签颜色
                        formatter: '{b}: {d}%'  // 标签格式
                    },
                    labelLine: { 
                        length: 8,         // 标签线第一段长度
                        length2: 6,        // 标签线第二段长度
                        lineStyle: { color: '#cbd5dc' }
                    },
                    itemStyle: {
                        borderRadius: 4,   // 扇区圆角
                        borderColor: '#fff', // 扇区边框颜色
                        borderWidth: 2      // 扇区边框宽度
                    }
                }]
            });
            
            // 延迟调整图表大小，确保容器已渲染
            setTimeout(function() { chart.resize(); }, 80);
            return chart;
        }

        // ========================================
        // 饼图渲染函数
        // ========================================
        
        // 渲染饼图
        function renderCharts(stats) {
            // 准备办学层次分布数据
            const levelData = [
                { value: stats.doubleFirst, name: '双一流', itemStyle: { color: '#3498db' } },
                { value: stats.undergraduate - stats.doubleFirst, name: '普通本科', itemStyle: { color: '#95a5a6' } },
                { value: stats.junior, name: '专科', itemStyle: { color: '#f39c12' } }
            ];
            
            // 准备办学性质分布数据
            const natureData = [
                { value: stats.public, name: '公办', itemStyle: { color: '#27ae60' } },
                { value: stats.private, name: '民办', itemStyle: { color: '#e74c3c' } }
            ];
            
            // 销毁旧的饼图实例
            if (pieChart1) {
                pieChart1.dispose();
                pieChart1 = null;
            }
            if (pieChart2) {
                pieChart2.dispose();
                pieChart2 = null;
            }
            
            // 延迟创建新饼图，确保DOM已渲染
            setTimeout(function() {
                pieChart1 = createPieChart('pieChart1', '办学层次分布', levelData);
                pieChart2 = createPieChart('pieChart2', '办学性质分布', natureData);
            }, 250);
        }

        // ========================================
        // 模态框显示函数
        // ========================================
        
        // 显示省份高校信息模态框
        function showProvinceModal(provinceName) {
            currentProvince = provinceName;
            document.getElementById('modalTitle').textContent = provinceName + '高校';
            document.getElementById('modalOverlay').classList.add('active');
            
            // 重置所有筛选条件
            eduLevelFilter = 'all';
            extraFilters = { doubleFirst: false, public: null };
            
            // 重置筛选按钮状态
            document.querySelectorAll('.filter-tab').forEach(function(tab) {
                tab.classList.remove('active');
            });
            document.querySelector('.filter-tab[data-filter="all"]').classList.add('active');
            
            // 重置统计卡片激活状态
            document.querySelectorAll('.stat-card').forEach(function(card) {
                card.classList.remove('active');
            });
            
            // 更新筛选指示器并刷新高校列表
            updateFilterIndicator();
            refreshUniversityList();
        }

        // ========================================
        // 高校列表刷新函数
        // ========================================
        
        // 刷新高校列表
        function refreshUniversityList() {
            // 获取筛选后的高校列表
            const universities = getUniversitiesByProvince(currentProvince);
            
            // 计算统计数据
            const stats = calculateStats(universities);
            
            // 渲染统计卡片和高校列表
            renderStats(stats);
            renderUniversityList(universities);
            
            // 延迟渲染饼图
            setTimeout(function() {
                renderCharts(stats);
            }, 300);
        }

        // ========================================
        // 高校列表渲染函数
        // ========================================
        
        // 渲染高校列表
        function renderUniversityList(universities) {
            const container = document.getElementById('universitiesSection');
            const countSpan = document.getElementById('universityCount');
            
            // 如果没有数据，显示空状态
            if (universities.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>暂无符合条件的高校数据</p></div>';
                countSpan.textContent = '共 0 所院校';
                return;
            }
            
            // 更新高校数量显示
            countSpan.textContent = '共 ' + universities.length + ' 所院校';
            
            // 生成高校卡片HTML
            let html = '';
            universities.forEach(function(university) {
                // 判断是否为本科院校
                const isUndergraduate = university.eduLevel === '本科' || university.eduLevel === '职业本科';
                const levelClass = isUndergraduate ? 'undergraduate' : 'junior';
                const levelBadge = isUndergraduate ? '<span class="edu-level-badge undergraduate">本科</span>' : '<span class="edu-level-badge junior">专科</span>';
                
                // 处理特色专业标签
                const specialties = university.specialties ? university.specialties.split('、') : [];
                const specialtyTags = specialties.map(function(s) { 
                    return '<span class="specialty-tag">' + s + '</span>'; 
                }).join('');
                
                // 生成单个高校卡片HTML
                html += '<div class="university-card ' + levelClass + '">' +
                        '<div class="university-name">' + university.name + levelBadge + '</div>' +
                        '<div class="info-row">' +
                        '<div class="info-item"><span class="info-label">主管部门:</span><span class="info-value">' + (university.admin || '') + '</span></div>' +
                        '<div class="info-item"><span class="info-label">所在城市:</span><span class="info-value">' + (university.city || '') + '</span></div>' +
                        '</div>' +
                        '<div class="info-row">' +
                        '<div class="info-item"><span class="info-label">办学层次:</span><span class="info-value">' + (university.eduLevel || '') + '</span></div>' +
                        '<div class="info-item"><span class="info-label">院校层次:</span><span class="info-value">' + (university.level || '') + '</span></div>' +
                        '</div>' +
                        (specialtyTags ? '<div class="specialties-container"><div class="info-item"><span class="info-label">特色专业:</span></div>' + specialtyTags + '</div>' : '') +
                        '</div>';
            });
            
            // 将HTML插入页面
            container.innerHTML = html;
        }

        // ========================================
        // 事件监听器
        // ========================================
        
        // 关闭按钮点击事件
        document.getElementById('closeBtn').addEventListener('click', function() {
            document.getElementById('modalOverlay').classList.remove('active');
        });
        
        // 模态框遮罩层点击事件（点击遮罩层关闭模态框）
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.remove('active');
            }
        });
        
        // 搜索框输入事件
        document.getElementById('searchBox').addEventListener('input', function() {
            const keyword = this.value.toLowerCase();
            const allUniversities = getUniversitiesByProvince(currentProvince);
            const filtered = allUniversities.filter(function(u) { 
                return u.name.toLowerCase().includes(keyword); 
            });
            const stats = calculateStats(filtered);
            renderStats(stats);
            renderCharts(stats);
            renderUniversityList(filtered);
        });
        
        // 筛选标签点击事件
        document.querySelectorAll('.filter-tab').forEach(function(tab) {
            tab.addEventListener('click', function() {
                // 移除所有标签的激活状态
                document.querySelectorAll('.filter-tab').forEach(function(t) { 
                    t.classList.remove('active'); 
                });
                // 激活当前标签
                this.classList.add('active');
                // 更新办学层次筛选器
                eduLevelFilter = this.getAttribute('data-filter');
                // 更新筛选指示器并刷新高校列表
                updateFilterIndicator();
                refreshUniversityList();
            });
        });
        
        // ========================================
        // 页面初始化
        // ========================================
        
        // DOM加载完成后初始化地图
        document.addEventListener('DOMContentLoaded', function() {
            initChart();
        });
        
        // 窗口大小改变时调整图表大小
        window.addEventListener('resize', function() {
            if (pieChart1) pieChart1.resize();
            if (pieChart2) pieChart2.resize();
        });
    </script>
